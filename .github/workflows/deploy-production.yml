name: Deploy to Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_PRODUCTION }}

      - name: Add known hosts
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_SERVER_HOST }}
          SSH_PORT: ${{ secrets.PRODUCTION_SERVER_PORT }}
        run: |
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Ensure target theme directory exists on remote
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_SERVER_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_SERVER_USER }}
          SSH_PORT: ${{ secrets.PRODUCTION_SERVER_PORT }}
          THEME_PATH: ${{ secrets.PRODUCTION_THEME_PATH }}
        run: |
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER"@"$SSH_HOST" "mkdir -p \"$THEME_PATH\""

      - name: Rsync theme files to PRODUCTION
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_SERVER_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_SERVER_USER }}
          SSH_PORT: ${{ secrets.PRODUCTION_SERVER_PORT }}
          THEME_PATH: ${{ secrets.PRODUCTION_THEME_PATH }}
        run: |
          rsync -avzc --delete --exclude='.*' --exclude README.md \
            -e "ssh -o StrictHostKeyChecking=no -p $SSH_PORT" \
            ./ "$SSH_USER"@"$SSH_HOST":"$THEME_PATH"

      - name: Clear WordPress Cache
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_SERVER_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_SERVER_USER }}
          SSH_PORT: ${{ secrets.PRODUCTION_SERVER_PORT }}
        run: |
          ssh -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER"@"$SSH_HOST" "wp cache flush"
