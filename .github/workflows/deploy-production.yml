name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.REMOTE_HOST }}
          SSH_PORT: ${{ secrets.PRODUCTION_SERVER_PORT }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/xserver_deploy
          chmod 600 ~/.ssh/xserver_deploy
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Ensure target theme directory exists on remote
        env:
          SSH_HOST: ${{ secrets.REMOTE_HOST }}
          SSH_USER: ${{ secrets.REMOTE_USER }}
          SSH_PORT: ${{ secrets.PRODUCTION_SERVER_PORT }}
          THEME_PATH: ${{ secrets.REMOTE_TARGET_PROD }}
        run: |
          ssh -i ~/.ssh/xserver_deploy -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER"@"$SSH_HOST" "mkdir -p \"$THEME_PATH\""

      - name: Rsync theme files to PRODUCTION
        env:
          SSH_HOST: ${{ secrets.REMOTE_HOST }}
          SSH_USER: ${{ secrets.REMOTE_USER }}
          SSH_PORT: ${{ secrets.PRODUCTION_SERVER_PORT }}
          THEME_PATH: ${{ secrets.REMOTE_TARGET_PROD }}
        run: |
          rsync -avzc --delete --exclude='.*' --exclude README.md \
            -e "ssh -i ~/.ssh/xserver_deploy -o StrictHostKeyChecking=no -p $SSH_PORT" \
            ./ "$SSH_USER"@"$SSH_HOST":"$THEME_PATH"

      - name: Clear WordPress Cache
        env:
          SSH_HOST: ${{ secrets.REMOTE_HOST }}
          SSH_USER: ${{ secrets.REMOTE_USER }}
          SSH_PORT: ${{ secrets.PRODUCTION_SERVER_PORT }}
        run: |
          ssh -i ~/.ssh/xserver_deploy -o StrictHostKeyChecking=no -p "$SSH_PORT" "$SSH_USER"@"$SSH_HOST" "wp cache flush"
